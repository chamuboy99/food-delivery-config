server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Restaurant Service Route
spring.cloud.gateway.server.webmvc.routes[0].id=restaurant-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://restaurant-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/restaurants/**

# Order Service Route
spring.cloud.gateway.server.webmvc.routes[1].id=order-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/orders/**